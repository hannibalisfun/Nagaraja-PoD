l_english:

 ##################################
 ##### Pilgrimage to Enoch Journey
 ##################################

 # Journey sidebar window entries
 pilgrimage_to_enoch_name: "Pilgrimage to Enoch"
 pilgrimage_to_enoch_desc: "The ghost-city of Enoch lies deep within the Underworld, a place of terrible power and forbidden knowledge. With mastery of Necromancy, you can make the perilous journey there and return with wisdom beyond mortal comprehension.\n\n#weak This pilgrimage can only be undertaken once.#!"
 pilgrimage_to_enoch_effects: "You will journey through the Shadowlands to the ghost-city of Enoch. Along the way you will face a series of encounters drawn from the depths of the Underworld -- the Tempest, spectral markets, anomalies, and fellow travelers.\n\nPossible rewards:\n$EFFECT_LIST_BULLET$The Pilgrim of Enoch [trait|E]\n$EFFECT_LIST_BULLET$Up to 3,000 [learning|E] [lifestyle_experience|E]\n$EFFECT_LIST_BULLET$[prestige|E] and dynasty [prestige|E]\n$EFFECT_LIST_BULLET$Various temporary modifiers from encounters"
 pilgrimage_to_enoch_tt: "The dead city calls to those who would listen."

 # Planning phase completion
 pilgrimage_to_enoch_planning_title: "The Shroud Beckons"
 pilgrimage_to_enoch_planning_desc: "Your preparations are complete. The rituals have been performed, the offerings made, and the path through the Shroud has been mapped as well as any living being can manage.\n\nThe ghost-city of Enoch awaits in the depths of the Underworld."
 pilgrimage_to_enoch_planning_confirm: "Into the Shadowlands"
 pilgrimage_to_enoch_planning_decline: "$POD_journey_planning_decline_default$"

 # Travel phase
 pilgrimage_to_enoch_travel_title: "Descent into the Underworld"
 pilgrimage_to_enoch_travel_desc: "The Shroud parts before you. The Underworld awaits, and with it, the ancient ghost-city of Enoch."
 pilgrimage_to_enoch_travel_confirm: "There is no turning back now."
